<div class="page-header">
  <h1 class="page-title">
    <i class="fa-solid fa-plus"></i>
    Tạo đặt phòng mới
  </h1>

  <a routerLink="/bookings" class="btn-back">
    <i class="fa-solid fa-arrow-left"></i>
    Quay lại
  </a>
</div>

<form class="form-card" (ngSubmit)="saveBooking()">
  <!-- Khách hàng -->

  <div class="form-group">
    <label>Khách hàng</label>

    <select [(ngModel)]="booking.customer_id" name="customer_id">
      <option value="">-- Chọn khách hàng --</option>

      <option *ngFor="let c of customers" [value]="c.id">
        {{ c.full_name }}
      </option>
    </select>
  </div>

  <!-- Phòng -->

  <div class="form-group">
    <label>Phòng</label>

    <select [(ngModel)]="booking.room_id" name="room_id">
      <option value="">-- Chọn phòng --</option>

      <option *ngFor="let r of rooms" [value]="r.id">
        Phòng {{ r.room_number }} (Tầng {{ r.floor_number }}) - {{ r.status }}
      </option>
    </select>
  </div>

  <!-- Check In -->

  <div class="form-group">
    <label>Check-in</label>

    <input type="date" [(ngModel)]="booking.check_in" name="check_in" />
  </div>

  <!-- Check Out -->

  <div class="form-group">
    <label>Check-out</label>

    <input type="date" [(ngModel)]="booking.check_out" name="check_out" />
  </div>

  <div class="form-actions">
    <button type="submit" class="btn-save">
      <i class="fa-solid fa-check"></i>
      Lưu
    </button>

    <a routerLink="/bookings" class="btn-cancel">
      <i class="fa-solid fa-times"></i>
      Hủy
    </a>
  </div>
</form>
