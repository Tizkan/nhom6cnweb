<div class="booking-container">

  <div class="booking-header">
    <h1>Tạo phòng mới</h1>
    <button type="button" class="btn-top-back" (click)="goBack()">Quay lại</button>
  </div>

  <div class="booking-card">
    <form #roomForm="ngForm" (ngSubmit)="onSubmit(roomForm)">

      <div class="form-group">
        <label>Số phòng</label>
        <input type="text" name="room_number" ngModel required placeholder="Nhập số phòng (VD: 101)..." />
      </div>

      <div class="form-group">
        <label>Loại phòng</label>
        <select name="room_type_id" ngModel required>
          <option value="" disabled selected>-- Chọn loại phòng --</option>
          <option value="1">Standard</option>
          <option value="2">Deluxe</option>
          <option value="3">Suite</option>
        </select>
      </div>

      <div class="form-group">
        <label>Tầng</label>
        <input type="number" name="floor_number" ngModel required placeholder="Nhập số tầng..." />
      </div>

      <div class="form-group">
        <label>Giá/đêm</label>
        <input type="number" name="price_per_night" ngModel min="0" placeholder="VD: 500000..." />
      </div>

      <div class="form-group">
        <label>Trạng thái ban đầu</label>
        <select name="status" [ngModel]="'available'">
          <option value="available">Trống</option>
          <option value="booked">Đặt trước</option>
          <option value="occupied">Đang thuê</option>
        </select>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-save" [disabled]="!roomForm.valid">Lưu</button>
        <button type="button" class="btn-cancel" (click)="goBack()">Hủy</button>
      </div>

    </form>
  </div>

</div>
