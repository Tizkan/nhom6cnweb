<div class="container">

  <div class="header">
    <h2>Quản lý phòng</h2>
    <button class="add-btn" routerLink="/rooms/create-room">+ Thêm phòng</button>
  </div>

  <input type="text" placeholder="🔍 Tìm kiếm phòng..." class="search" />

  <table>
    <thead>
      <tr>
        <th>SỐ PHÒNG</th>
        <th>LOẠI PHÒNG</th>
        <th>TẦNG</th>
        <th>TRẠNG THÁI</th>
        <th>THAO TÁC</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let r of rooms">
        <td class="bold">{{ r.room_number }}</td>
        <td>{{ r.type || 'Standard' }}</td>
        <td>Tầng {{ r.floor }}</td>

        <td>
          <span
            class="status"
            [ngClass]="{
              'available': r.status === 'available',
              'occupied':  r.status === 'occupied',
              'booked':    r.status === 'booked',
              'cleaning':  r.status === 'cleaning'
            }"
          >
            {{
              r.status === 'available' ? 'Trống' :
              r.status === 'occupied'  ? 'Đang thuê' :
              r.status === 'booked'    ? 'Đặt trước' :
              r.status === 'cleaning'  ? 'Đang dọn' : ''
            }}
          </span>
        </td>

        <td>
          <div class="actions">
            <button class="edit-btn" (click)="goToEdit(r.id)">✏</button>
            <button class="delete-btn" (click)="deleteRoom(r.id)">✖</button>
          </div>
        </td>

      </tr>
    </tbody>
  </table>

</div>
