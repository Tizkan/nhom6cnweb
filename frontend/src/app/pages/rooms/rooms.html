<div class="container">

  <div class="header">
    <h2>Quản lý phòng</h2>
    <button class="add-btn" routerLink="/rooms/create-room">+ Thêm phòng</button>
  </div>

  <input
    type="text"
    placeholder=" Tìm kiếm phòng..."
    class="search"
    [(ngModel)]="searchText"
    (input)="onSearch()"
  />

  <table>
    <thead>
      <tr>
        <th>SỐ PHÒNG</th>
        <th>LOẠI PHÒNG</th>
        <th>TẦNG</th>
        <th>GIÁ/ĐÊM</th>
        <th>TRẠNG THÁI</th>
        <th>THAO TÁC</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let r of filteredRooms">
        <td class="bold">{{ r.room_number }}</td>
        <td>{{ getTypeName(r.room_type_id) }}</td>
        <td>Tầng {{ r.floor }}</td>

        <td class="price">
          {{ r.price_per_night ? (r.price_per_night | number:'1.0-0') : '—' }}
        </td>

        <td>
          <span
            class="status"
            [ngClass]="{
              'available': r.status === 'available',
              'occupied':  r.status === 'occupied',
              'booked':    r.status === 'booked',
              'cleaning':  r.status === 'cleaning'
            }"
          >
            {{ getStatusLabel(r.status) }}
          </span>
        </td>

        <td>
          <div class="actions">
            <button class="edit-btn" (click)="goToEdit(r.id)">✏</button>
            <button class="delete-btn" (click)="deleteRoom(r.id)">✖</button>
          </div>
        </td>

      </tr>

      <tr *ngIf="filteredRooms.length === 0">
        <td colspan="6" style="text-align:center; padding: 20px; color: #999;">
          Không tìm thấy phòng nào
        </td>
      </tr>

    </tbody>
  </table>

</div>
