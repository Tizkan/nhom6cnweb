<div class="page-header">
  <h1>Sửa phòng</h1>
</div>

<form class="form-card" (ngSubmit)="updateRoom()">

  <div class="form-group">
    <label>Số phòng</label>
    <input type="text" [(ngModel)]="room.room_number" name="room_number" placeholder="VD: 101" />
  </div>

  <div class="form-group">
    <label>Tầng</label>
    <input type="number" [(ngModel)]="room.floor_number" name="floor_number" placeholder="VD: 1" min="1" />
  </div>

  <div class="form-group">
    <label>Loại phòng</label>
    <select [(ngModel)]="room.room_type_id" name="room_type_id">
      <option *ngFor="let t of roomTypes" [value]="t.id">{{ t.name }}</option>
    </select>
  </div>

  <div class="form-group">
    <label>Trạng thái</label>
    <select [(ngModel)]="room.status" name="status">
      <option value="available">Trống</option>
      <option value="occupied">Đang ở</option>
      <option value="booked">Đặt Đặt</option>
      <option value="cleaning">Đã Trả Phòng</option>
      <option value="maintenance">Đang Bảo Trì</option>
    </select>
  </div>

  <button type="submit" class="btn-save">Cập nhật</button>

</form>
